name: 毎日記事を自動生成

on:
  schedule:
    # 毎朝9時 JST（= UTC 0時）に実行
    - cron: "0 0 * * *"
  workflow_dispatch:
    # GitHub 画面から手動でも実行できる

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # リポジトリへの push を許可

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: anthropic をインストール
        run: pip install anthropic

      - name: 記事を生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_article.py

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name  "Lo-Hi Bot"
          git config user.email "bot@users.noreply.github.com"
          git add .
          # 変更がない場合はスキップ
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "🎵 $(date '+%Y-%m-%d') の新記事を追加"
          git push
